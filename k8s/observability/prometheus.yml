global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['payments-demo-app:8080']
        labels: { component: processor }

  - job_name: mariadb
    static_configs:
      - targets: ['mysqld-exporter:9104']
        labels: { instance: 'mariadb' }

  - job_name: gridgain
    static_configs:
      - targets: ['gridgain:9404']

  - job_name: debezium-connect
    static_configs:
      - targets: ['debezium-connect:9404']
