apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: payments-demo
  labels: { app: grafana }
spec:
  replicas: 1
  selector: { matchLabels: { app: grafana } }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      enableServiceLinks: false
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          env:
            - { name: GF_SECURITY_ADMIN_USER, value: "admin" }
            - { name: GF_SECURITY_ADMIN_PASSWORD, value: "admin" }
            - { name: GF_USERS_ALLOW_SIGN_UP, value: "false" }
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "true" }
            - { name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: "Viewer" }
          ports:
            - { containerPort: 3000 }
          volumeMounts:
            - { name: datasource, mountPath: /etc/grafana/provisioning/datasources }
            - { name: provider, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboards, mountPath: /var/lib/grafana/dashboards }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 18
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { memory: "512Mi" }
      volumes:
        - name: datasource
          configMap: { name: grafana-datasource }
        - name: provider
          configMap: { name: grafana-dashboards-provider }
        - name: dashboards
          configMap: { name: grafana-dashboards }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: payments-demo
spec:
  type: NodePort
  selector: { app: grafana }
  ports:
    - { name: http, port: 3000, targetPort: 3000, nodePort: 30030 }
