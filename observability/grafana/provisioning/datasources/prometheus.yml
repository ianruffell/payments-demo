# Grafana data source provisioning (spec 010). The uid `prometheus` is referenced by every
# provisioned dashboard, so it must remain stable.
apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 10s
