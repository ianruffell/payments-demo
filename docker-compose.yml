name: gridgain

x-gridgain-def:
  &gridgain-def
  image: gridgain/ultimate:8.9.32
  environment:
    JVM_MAX_MEM: "2g"
    JVM_MIN_MEM: "1g"
    CONFIG_URI: "/opt/gridgain/etc/ignite-config.xml"
    OPTION_LIBS: ignite-indexing,control-center-agent
    JVM_OPTS: >-
      -Djava.net.preferIPv4Stack=true
      -Dcontrol.center.agent.uris=http://control-center-backend:3000
  networks:
    - gridgain
    - gridgain-cc
  volumes:
    - ./gridgain-license.xml:/opt/gridgain/gridgain-license.xml
    - ./src/main/resources/ignite-config.xml:/opt/gridgain/etc/ignite-config.xml

services:
  oracle-db:
    image: gvenzl/oracle-free:23.26.0-slim-faststart
    profiles:
      - oracle
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: PAYMENTS_APP
      APP_USER_PASSWORD: payments_app
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - gridgain
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./oracle/init:/container-entrypoint-initdb.d:ro

  db1:
    image: ${MARIADB_SERVER_IMAGE:-docker.mariadb.com/enterprise-server:latest}
    profiles:
      - mariadb
    hostname: db1
    command:
      - --wsrep-new-cluster
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-mariadb}
      MARIADB_DATABASE: payments_app
      MARIADB_USER: payments_app
      MARIADB_PASSWORD: ${MARIADB_APP_PASSWORD:-PaymentsApp123!}
      SKIP_INIT_WSREP_OFF: "1"
    healthcheck:
      test:
        - CMD-SHELL
        - mariadb --protocol=TCP -h 127.0.0.1 -uroot -p"$${MARIADB_ROOT_PASSWORD}" -e "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks:
      - gridgain
    volumes:
      - db1-data:/var/lib/mysql
      - ./mariadb/db1.cnf:/etc/my.cnf.d/60-galera.cnf:ro
      - ./mariadb/init:/docker-entrypoint-initdb.d:ro

  db2:
    image: ${MARIADB_SERVER_IMAGE:-docker.mariadb.com/enterprise-server:latest}
    profiles:
      - mariadb
    hostname: db2
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-mariadb}
    depends_on:
      db1:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - mariadb --protocol=TCP -h 127.0.0.1 -uroot -p"$${MARIADB_ROOT_PASSWORD}" -e "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks:
      - gridgain
    volumes:
      - db2-data:/var/lib/mysql
      - ./mariadb/db2.cnf:/etc/my.cnf.d/60-galera.cnf:ro

  db3:
    image: ${MARIADB_SERVER_IMAGE:-docker.mariadb.com/enterprise-server:latest}
    profiles:
      - mariadb
    hostname: db3
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-mariadb}
    depends_on:
      db1:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - mariadb --protocol=TCP -h 127.0.0.1 -uroot -p"$${MARIADB_ROOT_PASSWORD}" -e "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks:
      - gridgain
    volumes:
      - db3-data:/var/lib/mysql
      - ./mariadb/db3.cnf:/etc/my.cnf.d/60-galera.cnf:ro

  maxscale1:
    image: ${MAXSCALE_IMAGE:-docker.mariadb.com/maxscale:latest}
    profiles:
      - mariadb
    hostname: maxscale1
    depends_on:
      db1:
        condition: service_healthy
      db2:
        condition: service_healthy
      db3:
        condition: service_healthy
    networks:
      - gridgain
    ports:
      - "4006:3306"
      - "8989:8989"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS -u admin:mariadb http://127.0.0.1:8989/v1/servers >/dev/null
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: on-failure
    volumes:
      - ./maxscale/maxscale.cnf:/etc/maxscale.cnf:ro

  maxscale2:
    image: ${MAXSCALE_IMAGE:-docker.mariadb.com/maxscale:latest}
    profiles:
      - mariadb
    hostname: maxscale2
    depends_on:
      db1:
        condition: service_healthy
      db2:
        condition: service_healthy
      db3:
        condition: service_healthy
    networks:
      - gridgain
    ports:
      - "4007:3306"
      - "8990:8989"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS -u admin:mariadb http://127.0.0.1:8989/v1/servers >/dev/null
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: on-failure
    volumes:
      - ./maxscale/maxscale.cnf:/etc/maxscale.cnf:ro

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    networks:
      - gridgain
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: on-failure

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - gridgain
    ports:
      - "29092:29092"
    restart: on-failure

  debezium-connect:
    build:
      context: ./debezium-connect
      dockerfile: Dockerfile
    depends_on:
      - kafka
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    networks:
      - gridgain
    ports:
      - "8083:8083"
    restart: on-failure

  debezium-register-oracle:
    image: curlimages/curl:8.8.0
    profiles:
      - oracle
    depends_on:
      - debezium-connect
      - oracle-db
      - payments-demo-app
    command: ["/bin/sh", "/scripts/register-oracle-connector.sh"]
    restart: on-failure
    networks:
      - gridgain
    volumes:
      - ./oracle/register-oracle-connector.sh:/scripts/register-oracle-connector.sh:ro
      - ./oracle/oracle-source-connector.json:/config/oracle-source-connector.json:ro

  debezium-register-mariadb:
    image: curlimages/curl:8.8.0
    profiles:
      - mariadb
    depends_on:
      debezium-connect:
        condition: service_started
      maxscale1:
        condition: service_healthy
      payments-demo-app:
        condition: service_started
    command: ["/bin/sh", "/scripts/register-mariadb-connector.sh"]
    restart: on-failure
    networks:
      - gridgain
    volumes:
      - ./mariadb/register-mariadb-connector.sh:/scripts/register-mariadb-connector.sh:ro
      - ./mariadb/mariadb-source-connector.json:/config/mariadb-source-connector.json:ro

  gg8-node1:
    << : *gridgain-def
    ports:
      - 20800:10800
      - 11211:11211
      - 47100:47100
      - 47500:47500
  gg8-node2:
    << : *gridgain-def
    ports:
      - 20801:10800
      - 11212:11211
      - 47101:47100
      - 47501:47501
  gg8-node3:
    << : *gridgain-def
    ports:
      - 20802:10800
      - 11213:11211
      - 47102:47100
      - 47502:47501

  merchant-00001:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: merchant-simulator
      DEMO_MERCHANT_ID: MER-00001
      DEMO_MERCHANT_NAME: Skytrail Journeys
      DEMO_MERCHANT_CALLBACK_URL: http://payments-demo-app:8080/api/merchant-results
      DEMO_MERCHANT_MIN_DELAY_MS: 350
      DEMO_MERCHANT_MAX_DELAY_MS: 2400
      DEMO_MERCHANT_TIMEOUT_DELAY_MIN_MS: 11000
      DEMO_MERCHANT_TIMEOUT_DELAY_MAX_MS: 13000
      DEMO_MERCHANT_TIMEOUT_PROBABILITY: 0.02
      DEMO_MERCHANT_APPROVAL_RATE: 0.98
      DEMO_MERCHANT_DECLINE_ABOVE_MINOR: 1400000
    restart: on-failure
    networks:
      - gridgain

  merchant-00002:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: merchant-simulator
      DEMO_MERCHANT_ID: MER-00002
      DEMO_MERCHANT_NAME: Jackpot Junction
      DEMO_MERCHANT_CALLBACK_URL: http://payments-demo-app:8080/api/merchant-results
      DEMO_MERCHANT_MIN_DELAY_MS: 500
      DEMO_MERCHANT_MAX_DELAY_MS: 3200
      DEMO_MERCHANT_TIMEOUT_DELAY_MIN_MS: 11250
      DEMO_MERCHANT_TIMEOUT_DELAY_MAX_MS: 13500
      DEMO_MERCHANT_TIMEOUT_PROBABILITY: 0.03
      DEMO_MERCHANT_APPROVAL_RATE: 0.97
      DEMO_MERCHANT_DECLINE_ABOVE_MINOR: 1250000
    restart: on-failure
    networks:
      - gridgain

  merchant-00003:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: merchant-simulator
      DEMO_MERCHANT_ID: MER-00003
      DEMO_MERCHANT_NAME: Green Basket Market
      DEMO_MERCHANT_CALLBACK_URL: http://payments-demo-app:8080/api/merchant-results
      DEMO_MERCHANT_MIN_DELAY_MS: 850
      DEMO_MERCHANT_MAX_DELAY_MS: 4300
      DEMO_MERCHANT_TIMEOUT_DELAY_MIN_MS: 11500
      DEMO_MERCHANT_TIMEOUT_DELAY_MAX_MS: 13800
      DEMO_MERCHANT_TIMEOUT_PROBABILITY: 0.04
      DEMO_MERCHANT_APPROVAL_RATE: 0.96
      DEMO_MERCHANT_DECLINE_ABOVE_MINOR: 1100000
    restart: on-failure
    networks:
      - gridgain

  merchant-00004:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: merchant-simulator
      DEMO_MERCHANT_ID: MER-00004
      DEMO_MERCHANT_NAME: Cornerstone Goods
      DEMO_MERCHANT_CALLBACK_URL: http://payments-demo-app:8080/api/merchant-results
      DEMO_MERCHANT_MIN_DELAY_MS: 1200
      DEMO_MERCHANT_MAX_DELAY_MS: 5200
      DEMO_MERCHANT_TIMEOUT_DELAY_MIN_MS: 11800
      DEMO_MERCHANT_TIMEOUT_DELAY_MAX_MS: 14200
      DEMO_MERCHANT_TIMEOUT_PROBABILITY: 0.05
      DEMO_MERCHANT_APPROVAL_RATE: 0.95
      DEMO_MERCHANT_DECLINE_ABOVE_MINOR: 1000000
    restart: on-failure
    networks:
      - gridgain

  merchant-00005:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: merchant-simulator
      DEMO_MERCHANT_ID: MER-00005
      DEMO_MERCHANT_NAME: Lucky Lantern Casino
      DEMO_MERCHANT_CALLBACK_URL: http://payments-demo-app:8080/api/merchant-results
      DEMO_MERCHANT_MIN_DELAY_MS: 1450
      DEMO_MERCHANT_MAX_DELAY_MS: 5600
      DEMO_MERCHANT_TIMEOUT_DELAY_MIN_MS: 12000
      DEMO_MERCHANT_TIMEOUT_DELAY_MAX_MS: 14400
      DEMO_MERCHANT_TIMEOUT_PROBABILITY: 0.05
      DEMO_MERCHANT_APPROVAL_RATE: 0.95
      DEMO_MERCHANT_DECLINE_ABOVE_MINOR: 950000
    restart: on-failure
    networks:
      - gridgain

  payments-demo-initiator:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - kafka
      - gg8-node1
      - gg8-node2
      - gg8-node3
      - merchant-00001
      - merchant-00002
      - merchant-00003
      - merchant-00004
      - merchant-00005
      - payments-demo-app
    environment:
      SPRING_PROFILES_ACTIVE: payment-initiator
      DEMO_GRIDGAIN_DISCOVERY_ADDRESSES: gg8-node1:47500..47509,gg8-node2:47500..47509,gg8-node3:47500..47509
      DEMO_GRIDGAIN_LICENSE_URL: /app/gridgain-license.xml
      DEMO_PROCESSOR_BASE_URL: http://payments-demo-app:8080
    restart: on-failure
    networks:
      - gridgain
    volumes:
      - ./gridgain-license.xml:/app/gridgain-license.xml:ro

  payments-demo-app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - kafka
      - gg8-node1
      - gg8-node2
      - gg8-node3
      - merchant-00001
      - merchant-00002
      - merchant-00003
      - merchant-00004
      - merchant-00005
    environment:
      DEMO_GRIDGAIN_DISCOVERY_ADDRESSES: gg8-node1:47500..47509,gg8-node2:47500..47509,gg8-node3:47500..47509
      DEMO_GRIDGAIN_LICENSE_URL: /app/gridgain-license.xml
      DEMO_EXTERNAL_DB_TYPE: ${DEMO_EXTERNAL_DB_TYPE}
      DEMO_EXTERNAL_DB_JDBC_URL: ${DEMO_EXTERNAL_DB_JDBC_URL}
      DEMO_EXTERNAL_DB_USERNAME: ${DEMO_EXTERNAL_DB_USERNAME}
      DEMO_EXTERNAL_DB_PASSWORD: ${DEMO_EXTERNAL_DB_PASSWORD}
      DEMO_EXTERNAL_DB_CDC_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DEMO_EXTERNAL_DB_CDC_SINK_GROUP_ID: payments-reference-cache-sink
      DEMO_EXTERNAL_DB_CDC_TOPIC_PREFIX: paymentsdemo
      DEMO_EXTERNAL_DB_CDC_SCHEMA_NAME: ${DEMO_EXTERNAL_DB_CDC_SCHEMA_NAME}
      DEMO_EXTERNAL_DB_CDC_CONNECTOR_NAME: ${DEMO_EXTERNAL_DB_CDC_CONNECTOR_NAME}
      DEMO_EXTERNAL_DB_CDC_ACCOUNTS_TOPIC: ${DEMO_EXTERNAL_DB_CDC_ACCOUNTS_TOPIC}
      DEMO_EXTERNAL_DB_CDC_MERCHANTS_TOPIC: ${DEMO_EXTERNAL_DB_CDC_MERCHANTS_TOPIC}
    networks:
      - gridgain
    ports:
      - "8080:8080"
    restart: on-failure
    volumes:
      - ./gridgain-license.xml:/app/gridgain-license.xml:ro

  payments-reference-cache-sink-oracle:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - oracle
    depends_on:
      - kafka
      - gg8-node1
      - gg8-node2
      - gg8-node3
      - debezium-register-oracle
    environment:
      SPRING_PROFILES_ACTIVE: reference-cache-sink
      DEMO_GRIDGAIN_DISCOVERY_ADDRESSES: gg8-node1:47500..47509,gg8-node2:47500..47509,gg8-node3:47500..47509
      DEMO_GRIDGAIN_LICENSE_URL: /app/gridgain-license.xml
      DEMO_EXTERNAL_DB_CDC_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DEMO_EXTERNAL_DB_CDC_SINK_GROUP_ID: payments-reference-cache-sink
      DEMO_EXTERNAL_DB_CDC_TOPIC_PREFIX: paymentsdemo
      DEMO_EXTERNAL_DB_CDC_SCHEMA_NAME: ${DEMO_EXTERNAL_DB_CDC_SCHEMA_NAME}
      DEMO_EXTERNAL_DB_CDC_ACCOUNTS_TOPIC: ${DEMO_EXTERNAL_DB_CDC_ACCOUNTS_TOPIC}
      DEMO_EXTERNAL_DB_CDC_MERCHANTS_TOPIC: ${DEMO_EXTERNAL_DB_CDC_MERCHANTS_TOPIC}
    restart: on-failure
    networks:
      - gridgain
    volumes:
      - ./gridgain-license.xml:/app/gridgain-license.xml:ro

  payments-reference-cache-sink-mariadb:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - mariadb
    depends_on:
      - kafka
      - gg8-node1
      - gg8-node2
      - gg8-node3
      - debezium-register-mariadb
    environment:
      SPRING_PROFILES_ACTIVE: reference-cache-sink
      DEMO_GRIDGAIN_DISCOVERY_ADDRESSES: gg8-node1:47500..47509,gg8-node2:47500..47509,gg8-node3:47500..47509
      DEMO_GRIDGAIN_LICENSE_URL: /app/gridgain-license.xml
      DEMO_EXTERNAL_DB_CDC_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DEMO_EXTERNAL_DB_CDC_SINK_GROUP_ID: payments-reference-cache-sink
      DEMO_EXTERNAL_DB_CDC_TOPIC_PREFIX: paymentsdemo
      DEMO_EXTERNAL_DB_CDC_SCHEMA_NAME: ${DEMO_EXTERNAL_DB_CDC_SCHEMA_NAME}
      DEMO_EXTERNAL_DB_CDC_ACCOUNTS_TOPIC: ${DEMO_EXTERNAL_DB_CDC_ACCOUNTS_TOPIC}
      DEMO_EXTERNAL_DB_CDC_MERCHANTS_TOPIC: ${DEMO_EXTERNAL_DB_CDC_MERCHANTS_TOPIC}
    restart: on-failure
    networks:
      - gridgain
    volumes:
      - ./gridgain-license.xml:/app/gridgain-license.xml:ro

volumes:
  oracle-data:
  db1-data:
  db2-data:
  db3-data:

networks:
  gridgain:
    name: gridgain
  gridgain-cc:
    name: gridgain-cc
