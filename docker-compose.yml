name: gridgain

x-gridgain-def:
  &gridgain-def
  image: gridgain/ultimate:8.9.32
  environment:
    JVM_MAX_MEM: "2g"
    JVM_MIN_MEM: "1g"
    CONFIG_URI: "/opt/gridgain/etc/ignite-config.xml"
    OPTION_LIBS: "control-center-agent"
  volumes:
    - ./gridgain-license.xml:/opt/gridgain/gridgain-license.xml
    - ./src/main/resources/ignite-config.xml:/opt/gridgain/etc/ignite-config.xml

services:
  oracle-db:
    image: gvenzl/oracle-free:23.26.0-slim-faststart
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: PAYMENTS_APP
      APP_USER_PASSWORD: payments_app
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./oracle/init:/container-entrypoint-initdb.d:ro

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: on-failure

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "29092:29092"
    restart: on-failure

  debezium-connect:
    build:
      context: ./debezium-connect
      dockerfile: Dockerfile
    depends_on:
      - kafka
      - oracle-db
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    ports:
      - "8083:8083"
    restart: on-failure

  debezium-register-oracle:
    image: curlimages/curl:8.8.0
    depends_on:
      - debezium-connect
      - oracle-db
      - payments-demo-app
    command: ["/bin/sh", "/scripts/register-oracle-connector.sh"]
    restart: on-failure
    volumes:
      - ./oracle/register-oracle-connector.sh:/scripts/register-oracle-connector.sh:ro
      - ./oracle/oracle-source-connector.json:/config/oracle-source-connector.json:ro

  gg8-node1:
    << : *gridgain-def
    ports:
      - 20800:10800
      - 11211:11211
      - 47100:47100
      - 47500:47500
  gg8-node2:
    << : *gridgain-def
    ports:
      - 20801:10800
      - 11212:11211
      - 47101:47100
      - 47501:47501
  gg8-node3:
    << : *gridgain-def
    ports:
      - 20802:10800
      - 11213:11211
      - 47102:47100
      - 47502:47501
      
  control-center-backend:
    image: gridgain/control-center-backend:latest
    restart: on-failure
    environment:
      # Tune JVM options for Control Center if needed
      - JVM_OPTS=

  control-center-frontend:
    image: gridgain/control-center-frontend:latest
    depends_on:
      - control-center-backend
    volumes:
      # Nginx config for routing UI -> backend
      - ./src/main/resources/control-center.conf:/etc/nginx/control-center.conf
    ports:
      # HOST:CONTAINER
      - "8008:8008"

  control-center-bootstrap:
    image: gridgain/ultimate:8.9.32
    depends_on:
      - gg8-node1
      - control-center-backend
    command: ["/bin/sh", "/scripts/register-control-center.sh"]
    restart: on-failure
    environment:
      GRIDGAIN_MANAGEMENT_HOST: gg8-node1
      GRIDGAIN_MANAGEMENT_PORT: 11211
      GRIDGAIN_CONTROL_CENTER_URI: http://control-center-backend:3000
    volumes:
      - ./gridgain/register-control-center.sh:/scripts/register-control-center.sh:ro

  merchant-00001:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: merchant-simulator
      DEMO_MERCHANT_ID: MER-00001
      DEMO_MERCHANT_NAME: Merchant 00001
      DEMO_MERCHANT_CALLBACK_URL: http://payments-demo-app:8080/api/merchant-results
      DEMO_MERCHANT_MIN_DELAY_MS: 350
      DEMO_MERCHANT_MAX_DELAY_MS: 2400
      DEMO_MERCHANT_TIMEOUT_DELAY_MIN_MS: 11000
      DEMO_MERCHANT_TIMEOUT_DELAY_MAX_MS: 13000
      DEMO_MERCHANT_TIMEOUT_PROBABILITY: 0.02
      DEMO_MERCHANT_APPROVAL_RATE: 0.98
      DEMO_MERCHANT_DECLINE_ABOVE_MINOR: 1400000
    restart: on-failure

  merchant-00002:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: merchant-simulator
      DEMO_MERCHANT_ID: MER-00002
      DEMO_MERCHANT_NAME: Merchant 00002
      DEMO_MERCHANT_CALLBACK_URL: http://payments-demo-app:8080/api/merchant-results
      DEMO_MERCHANT_MIN_DELAY_MS: 500
      DEMO_MERCHANT_MAX_DELAY_MS: 3200
      DEMO_MERCHANT_TIMEOUT_DELAY_MIN_MS: 11250
      DEMO_MERCHANT_TIMEOUT_DELAY_MAX_MS: 13500
      DEMO_MERCHANT_TIMEOUT_PROBABILITY: 0.03
      DEMO_MERCHANT_APPROVAL_RATE: 0.97
      DEMO_MERCHANT_DECLINE_ABOVE_MINOR: 1250000
    restart: on-failure

  merchant-00003:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: merchant-simulator
      DEMO_MERCHANT_ID: MER-00003
      DEMO_MERCHANT_NAME: Merchant 00003
      DEMO_MERCHANT_CALLBACK_URL: http://payments-demo-app:8080/api/merchant-results
      DEMO_MERCHANT_MIN_DELAY_MS: 850
      DEMO_MERCHANT_MAX_DELAY_MS: 4300
      DEMO_MERCHANT_TIMEOUT_DELAY_MIN_MS: 11500
      DEMO_MERCHANT_TIMEOUT_DELAY_MAX_MS: 13800
      DEMO_MERCHANT_TIMEOUT_PROBABILITY: 0.04
      DEMO_MERCHANT_APPROVAL_RATE: 0.96
      DEMO_MERCHANT_DECLINE_ABOVE_MINOR: 1100000
    restart: on-failure

  merchant-00004:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: merchant-simulator
      DEMO_MERCHANT_ID: MER-00004
      DEMO_MERCHANT_NAME: Merchant 00004
      DEMO_MERCHANT_CALLBACK_URL: http://payments-demo-app:8080/api/merchant-results
      DEMO_MERCHANT_MIN_DELAY_MS: 1200
      DEMO_MERCHANT_MAX_DELAY_MS: 5200
      DEMO_MERCHANT_TIMEOUT_DELAY_MIN_MS: 11800
      DEMO_MERCHANT_TIMEOUT_DELAY_MAX_MS: 14200
      DEMO_MERCHANT_TIMEOUT_PROBABILITY: 0.05
      DEMO_MERCHANT_APPROVAL_RATE: 0.95
      DEMO_MERCHANT_DECLINE_ABOVE_MINOR: 1000000
    restart: on-failure

  merchant-00005:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: merchant-simulator
      DEMO_MERCHANT_ID: MER-00005
      DEMO_MERCHANT_NAME: Merchant 00005
      DEMO_MERCHANT_CALLBACK_URL: http://payments-demo-app:8080/api/merchant-results
      DEMO_MERCHANT_MIN_DELAY_MS: 1450
      DEMO_MERCHANT_MAX_DELAY_MS: 5600
      DEMO_MERCHANT_TIMEOUT_DELAY_MIN_MS: 12000
      DEMO_MERCHANT_TIMEOUT_DELAY_MAX_MS: 14400
      DEMO_MERCHANT_TIMEOUT_PROBABILITY: 0.05
      DEMO_MERCHANT_APPROVAL_RATE: 0.95
      DEMO_MERCHANT_DECLINE_ABOVE_MINOR: 950000
    restart: on-failure

  payments-demo-initiator:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - oracle-db
      - kafka
      - gg8-node1
      - gg8-node2
      - gg8-node3
      - merchant-00001
      - merchant-00002
      - merchant-00003
      - merchant-00004
      - merchant-00005
      - payments-demo-app
    environment:
      SPRING_PROFILES_ACTIVE: payment-initiator
      DEMO_GRIDGAIN_DISCOVERY_ADDRESSES: gg8-node1:47500..47509,gg8-node2:47500..47509,gg8-node3:47500..47509
      DEMO_GRIDGAIN_LICENSE_URL: /app/gridgain-license.xml
      DEMO_PROCESSOR_BASE_URL: http://payments-demo-app:8080
      DEMO_ORACLE_JDBC_URL: jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
      DEMO_ORACLE_USERNAME: PAYMENTS_APP
      DEMO_ORACLE_PASSWORD: payments_app
    restart: on-failure
    volumes:
      - ./gridgain-license.xml:/app/gridgain-license.xml:ro

  payments-demo-app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - oracle-db
      - kafka
      - gg8-node1
      - gg8-node2
      - gg8-node3
      - merchant-00001
      - merchant-00002
      - merchant-00003
      - merchant-00004
      - merchant-00005
    environment:
      DEMO_GRIDGAIN_DISCOVERY_ADDRESSES: gg8-node1:47500..47509,gg8-node2:47500..47509,gg8-node3:47500..47509
      DEMO_GRIDGAIN_LICENSE_URL: /app/gridgain-license.xml
      DEMO_ORACLE_JDBC_URL: jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
      DEMO_ORACLE_USERNAME: PAYMENTS_APP
      DEMO_ORACLE_PASSWORD: payments_app
      DEMO_ORACLE_CDC_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8080:8080"
    restart: on-failure
    volumes:
      - ./gridgain-license.xml:/app/gridgain-license.xml:ro

  payments-oracle-cache-sink:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - kafka
      - gg8-node1
      - gg8-node2
      - gg8-node3
      - debezium-register-oracle
    environment:
      SPRING_PROFILES_ACTIVE: oracle-cache-sink
      DEMO_GRIDGAIN_DISCOVERY_ADDRESSES: gg8-node1:47500..47509,gg8-node2:47500..47509,gg8-node3:47500..47509
      DEMO_GRIDGAIN_LICENSE_URL: /app/gridgain-license.xml
      DEMO_ORACLE_CDC_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: on-failure
    volumes:
      - ./gridgain-license.xml:/app/gridgain-license.xml:ro

volumes:
  oracle-data:
